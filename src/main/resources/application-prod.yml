# ==================== PERFIL DE PRODUCCION (Railway) ====================
# Railway inyecta estas variables cuando se agrega el plugin de PostgreSQL.

spring:
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8081}

jwt:
  secret: ${JWT_SECRET:SkillSwap_Railway_Production_JWT_Secret_Key_Must_Be_256_Bits_Long_2024_Secure}
  expiration: 86400000

logging:
  level:
    com.skillswap: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
