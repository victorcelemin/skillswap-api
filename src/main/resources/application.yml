spring:
  application:
    name: SkillSwap

  # ==================== DATASOURCE ====================
  # Decisión: usar HikariCP (default en Spring Boot) con pool optimizado
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/skillswap_db}
    username: ${DB_USERNAME:skillswap_user}
    password: ${DB_PASSWORD:skillswap_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SkillSwapPool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # ==================== JPA / HIBERNATE ====================
  jpa:
    hibernate:
      ddl-auto: update   # En producción usar 'validate' + Flyway/Liquibase
    show-sql: false       # true solo en desarrollo
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ==================== JACKSON ====================
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ==================== SERVER ====================
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ==================== JWT ====================
# Decisión: externalizamos config JWT para poder rotar secrets sin recompilar
jwt:
  secret: ${JWT_SECRET:SkillSwap_Ultra_Secure_Secret_Key_For_JWT_Signing_2024_Base64Encoded}
  expiration: 86400000     # 24 horas en ms
  refresh-expiration: 604800000  # 7 días en ms

# ==================== WEBSOCKETS ====================
# ==================== CORS ====================
# Lista de origenes permitidos separada por comas.
# En produccion sobreescribir con la variable de entorno CORS_ALLOWED_ORIGINS.
cors:
  allowed-origins: >-
    http://localhost:3000,
    http://localhost:5173,
    http://localhost:4200,
    https://skillswap-frontend-rouge.vercel.app,
    https://*.vercel.app

websocket:
  allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ==================== CREDITOS ====================
# Configuración del sistema de créditos centralizada
credits:
  initial-balance: 50          # Créditos iniciales al registrarse
  session-reward: 10           # Créditos que gana el teacher al completar sesión
  session-cost-multiplier: 1   # Multiplicador base del costo por hora

# ==================== SWAGGER / OPENAPI ====================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  show-actuator: false

# ==================== LOGGING ====================
logging:
  level:
    com.skillswap: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
