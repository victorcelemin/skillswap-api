# ==================== PERFIL RENDER ====================
# Render inyecta las variables SPRING_DATASOURCE_* directamente.
# Spring Boot las toma con maxima precedencia (Property Source 3).
# No se necesita ningun override aqui — todo viene de envVars en render.yaml.

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20

server:
  port: ${PORT:8081}

logging:
  level:
    com.skillswap: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: INFO
